<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>复选框(大控小，小控大)实战练习案例</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      table {
        border-collapse: collapse;
        border-spacing: 0;
        border: 1px solid #c0c0c0;
        width: 500px;
        margin: 100px auto;
        text-align: center;
      }
      th {
        background-color: #09c;
        font: bold 16px "微软雅黑";
        color: #fff;
        height: 24px;
      }
      td {
        border: 1px solid #d0d0d0;
        color: #404060;
        padding: 10px;
      }
      .allCheck {
        width: 80px;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <!-- 全选复选框区域 -->
        <th class="allCheck">
          <input type="checkbox" name="" id="checkAll" />
          <span class="all">全选</span>
        </th>
        <th>商品</th>
        <th>商家</th>
        <th>价格</th>
      </tr>
      <!-- 商品列表行 -->
      <tr>
        <td><input type="checkbox" name="check" class="ck" /></td>
        <td>小米手机</td>
        <td>小米</td>
        <td>¥1999</td>
      </tr>
      <tr>
        <td><input type="checkbox" name="check" class="ck" /></td>
        <td>小米净水器</td>
        <td>小米</td>
        <td>¥2999</td>
      </tr>
      <tr>
        <td><input type="checkbox" name="check" class="ck" /></td>
        <td>小米空调</td>
        <td>小米</td>
        <td>¥4999</td>
      </tr>
    </table>

    <script>
      // 获取全选复选框元素 (ID: checkAll)
      const checkAll = document.querySelector("#checkAll");
      
      // 获取所有商品复选框元素 (class: ck)
      const cks = document.querySelectorAll(".ck");
      
      // 为全选复选框添加点击事件
      checkAll.addEventListener("click", function() {
        // 遍历所有商品复选框
        for (let i = 0; i < cks.length; i++) {
          // 将每个商品复选框的状态设置为全选按钮的当前状态
          cks[i].checked = this.checked;
        }
      });
      
      // 为每个商品复选框添加点击事件
      for (let i = 0; i < cks.length; i++) {
        cks[i].addEventListener('click', function() {
          // 检查所有商品复选框是否都被选中
          const allChecked = document.querySelectorAll('.ck:checked').length === cks.length;
          
          // 更新全选复选框的状态
          checkAll.checked = allChecked;
        });
      }
    </script>
  </body>
</html>
