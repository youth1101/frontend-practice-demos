<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小米搜索框组件案例</title>
  </head>
  <style>
    /* 全局重置与基础优化 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background-color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "MiSans", sans-serif;
    }
    ul {
      list-style: none;
    }

    /* 容器样式 */
    .mi {
      position: relative;
      width: 223px;
      margin: 100px auto;
    }

    /* 输入框核心样式 */
    .mi input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-size: 15px;
      line-height: 48px;
      color: #333;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      background-color: #fff;
      transition: all 0.25s ease;
      cursor: text;
    }

    /* 占位符样式兼容 */
    .mi input::placeholder {
      color: #999;
      opacity: 1;
    }
    .mi input::-webkit-input-placeholder {
      color: #999;
    }
    .mi input::-moz-placeholder {
      color: #999;
    }
    .mi input:-ms-input-placeholder {
      color: #999;
    }

    /* 输入框聚焦状态 */
    .mi .search {
      border-color: #ff6700;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      box-shadow: 0 0 0 3px rgba(255, 103, 0, 0.08);
    }

    /* 下拉结果列表 */
    .result-list {
      display: none;
      position: absolute;
      left: 0;
      top: 100%;
      width: 100%;
      border: 1px solid #ff6700;
      border-top: none;
      border-radius: 0 0 8px 8px;
      background-color: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      z-index: 999;
    }

    /* 列表项样式（修复原HTML文字在a标签外的问题） */
    .result-list li {
      position: relative;
      height: 42px;
      padding: 0 16px;
      font-size: 14px;
      line-height: 42px;
      color: #333;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* 首项分隔与样式区分 */
    .result-list li:first-child {
      border-bottom: 1px solid #f5f5f5;
      color: #666;
      font-weight: 500;
    }

    /* 全区域可点击优化 */
    .result-list a {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      text-decoration: none;
    }

    /* 悬浮交互效果 */
    .result-list li:hover {
      background-color: #f9f9f9;
      color: #ff6700;
    }
  </style>
  <body>
    <div class="mi">
      <input type="search" placeholder="小米笔记本" />
      <ul class="result-list">
        <li><a href="#">全部商品</a></li>
        <li><a href="#"></a>小米17</li>
        <li><a href="#"></a>小米17Pro</li>
        <li><a href="#"></a>小米17ProMax</li>
      </ul>
    </div>
    <script>
      const input = document.querySelector("[type=search]");
      const ul = document.querySelector(".result-list");
      input.addEventListener("focus", function () {
        ul.style.display = "block";
        input.classList.add("search");
      });
      input.addEventListener("blur", function () {
        ul.style.display = "none";
        input.classList.remove("search");
      });
    </script>
  </body>
</html>
