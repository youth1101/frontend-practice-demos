<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>评论输入框字数统计与聚焦失焦交互实战练习</title>
  </head>
  <style>
    /* 外层容器样式，用于包裹输入框、按钮和字数统计 */
    .wrapper {
      min-width: 400px; /* 最小宽度 400px */
      max-width: 800px; /* 最大宽度 800px */
      display: flex; /* 使用 Flex 布局，方便子元素对齐 */
      justify-content: flex-end; /* 子元素右对齐 */
    }

    /* 评论输入框样式 */
    .wrapper textarea {
      outline: none; /* 去掉默认的聚焦轮廓（蓝色边框） */
      border-color: transparent; /* 初始边框颜色透明 */
      resize: none; /* 禁止用户手动调整输入框大小 */
      background: #f5f5f5; /* 背景色为浅灰色 */
      border-radius: 4px; /* 圆角 4px */
      flex: 1; /* 占据容器剩余空间，实现自适应宽度 */
      transition: all 0.5s; /* 所有属性变化时添加 0.5s 过渡动画（平滑效果） */
      height: 30px; /* 初始高度 30px */
    }

    /* 输入框聚焦时的样式（获得光标后触发） */
    .wrapper textarea:focus {
      border-color: #e4e4e4; /* 聚焦时显示浅灰色边框 */
      background: #fff; /* 聚焦时背景变为白色 */
      height: 50px; /* 聚焦时高度平滑扩展为 50px */
    }

    /* 发布按钮样式 */
    .wrapper button {
      background: #00aeec; /* 背景色为亮蓝色 */
      color: #fff; /* 文字颜色为白色 */
      border: none; /* 去掉默认边框 */
      border-radius: 4px; /* 圆角 4px */
      margin-left: 10px; /* 左侧与输入框间距 10px */
      width: 70px; /* 固定宽度 70px */
      cursor: pointer; /* 鼠标悬停时显示手型光标 */
    }

    /* 字数统计样式 */
    .wrapper .total {
      margin-right: 80px; /* 右侧间距 80px（为按钮留出空间） */
      color: #999; /* 文字颜色为灰色 */
      margin-top: 5px; /* 顶部间距 5px */
      opacity: 0; /* 初始透明度为 0（隐藏状态） */
      transition: all 0.5s; /* 透明度变化时添加 0.5s 过渡动画 */
    }

    /* 评论列表容器样式（当前 HTML 中未使用，预留结构） */
    .list {
      min-width: 400px; /* 最小宽度 400px */
      max-width: 800px; /* 最大宽度 800px */
      display: flex; /* 使用 Flex 布局 */
    }

    /* 单个评论项样式（预留结构） */
    .list .item {
      width: 100%; /* 宽度 100% */
      display: flex; /* 使用 Flex 布局 */
    }

    /* 评论信息区域样式（预留结构） */
    .list .item .info {
      flex: 1; /* 占据剩余空间 */
      border-bottom: 1px dashed #e4e4e4; /* 底部虚线边框，分隔评论 */
      padding-bottom: 10px; /* 底部内边距 10px */
    }

    /* 评论项中段落样式（预留结构） */
    .list .item p {
      margin: 0; /* 去掉默认外边距，避免多余空白 */
    }

    /* 评论者名称样式（预留结构） */
    .list .item .name {
      color: #fb7299; /* 文字颜色为粉色 */
      font-size: 14px; /* 字体大小 14px */
      font-weight: bold; /* 字体加粗 */
    }

    /* 评论文本内容样式（预留结构） */
    .list .item .text {
      color: #333; /* 文字颜色为深灰色 */
      padding: 10px 0; /* 上下内边距 10px */
    }

    /* 评论时间样式（预留结构） */
    .list .item .time {
      color: #999; /* 文字颜色为灰色 */
      font-size: 12px; /* 字体大小 12px */
    }
  </style>
  <body>
    <!-- 输入框和发布按钮的容器 -->
    <div class="wrapper">
      <!-- 评论输入框：设置 id 供 JavaScript 获取，限制最大字数 200 -->
      <textarea
        id="tx"
        placeholder="发布一条友好评论"
        rows="2"
        maxlength="200"
      ></textarea>
      <!-- 发布按钮 -->
      <button>发布</button>
    </div>
    <!-- 字数统计的容器 -->
    <div class="wrapper">
      <!-- 字数统计显示：初始为 0/200字 -->
      <span class="total">0/200字</span>
    </div>

    <script>
      // 获取输入框元素（通过 id 选择器）
      const tx = document.querySelector('#tx')
      // 获取字数统计元素（通过类选择器）
      const total = document.querySelector('.total')

      // 监听输入框的「聚焦事件」（用户点击输入框时触发）
      tx.addEventListener('focus',function(){
          // 显示字数统计：将透明度设为 1（平滑过渡）
          total.style.opacity = 1
      })

      // 监听输入框的「失焦事件」（用户点击输入框外部时触发）
      tx.addEventListener('blur',function(){
          // 隐藏字数统计：将透明度设为 0（平滑过渡）
          total.style.opacity = 0
      })

      // 监听输入框的「输入事件」（用户输入/删除文字时实时触发）
      tx.addEventListener('input',function(){
          // 实时更新字数统计：获取输入框内容长度，拼接为「当前字数/200字」
          total.innerHTML = `${tx.value.length}/200字`
      })
    </script>
  </body>
</html>
