<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户协议倒计时demo</title>
  </head>
  <body>
    <textarea name="" id="" cols="30" rows="10">
        用户协议
    </textarea>
    <br />
    <button class="btn" disabled="disabled">我已经阅读用户协议(5)</button>
    <script>
      const btn = document.querySelector(".btn");
      let i = 5;
      let n = setInterval(function () {
        i--;
        btn.innerHTML = `我已经阅读用户协议(${i})`;
        if (i === 0) {
          clearInterval(n);
          btn.disabled = false;
          btn.innerHTML = `我已经阅读用户协议`;
        }
      }, 1000);
    </script>
  </body>
</html>
