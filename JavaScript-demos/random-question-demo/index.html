<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>随机问题案例</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    h2 {
      text-align: center;
    }
    .box {
      width: 600px;
      margin: 50px auto;
      display: flex;
      font-size: 25px;
      line-height: 40px;
    }
    .content {
      width: 450px;
      height: 40px;
      color: red;
    }
    .btns {
      text-align: center;
    }
    .btns button {
      width: 120px;
      height: 35px;
      margin: 0 50px;
    }
  </style>
  <body>
    <h2>随机问题</h2>
    <div class="box">
      <span>问题：</span>
      <div class="content">这里显示问题</div>
    </div>
    <div class="btns">
      <button class="start">开始</button>
      <button class="end">结束</button>
    </div>
    <script>
      // 创建一个数组负责存储数据
      const arr = [
        "typeof null的结果是什么?为什么?",
        "type of和instanceof有什么区别?",
        "如何判断JavaScript变量是数组?",
        "什么是Vue中的slot，它有什么作用?",
      ];
      //   获取元素
      const content = document.querySelector(".content");
      const start = document.querySelector(".start");
      const end = document.querySelector(".end");
      //   设置全局变量
      let timerId;
      let random;
      //   点击开始按钮
      start.addEventListener("click", function () {
        // 随机显示数组中的内容
        timerId = setInterval(function () {
          random = parseInt(Math.random() * arr.length);
          content.innerHTML = arr[random];
        }, 50);
        // 由于会删除本轮中的元素，防止下一次出现，这段代码可以防止出现undefined的情况
        if (arr.length === 1) {
          start.disabled = end.disabled = true;
        }
      });
      //   点击停止
      end.addEventListener("click", function () {
        clearInterval(timerId);
        // 删除元素，确保不会出现重复的现象
        arr.splice(random, 1);
      });
    </script>
  </body>
</html>
